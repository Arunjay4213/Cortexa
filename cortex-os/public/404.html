<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Cortexa</title>
    <script>
      // SPA redirect for GitHub Pages
      // Converts /docs to /?p=/docs so index.html can handle routing
      var path = window.location.pathname;
      if (path !== '/' && path !== '/index.html') {
        window.location.replace('/?p=' + encodeURIComponent(path));
      }
    </script>
  </head>
  <body></body>
</html>
