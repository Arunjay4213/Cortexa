    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a Ghost Token?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Ghost Token is a memory retrieved by your RAG or memory pipeline that the LLM never uses when generating its response — injected into context but contributing zero logit influence. Ghost Tokens inflate context size, add inference latency, and crowd out high-attribution memories. Benchmarks show ~42% of retrieved context in typical production agents is Ghost Tokens."
          }
        },
        {
          "@type": "Question",
          "name": "How does attribution tracing work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cortexa instruments your retrieval pipeline to compute a causal attribution score for each memory at inference time. The score represents that memory's contribution to the final output — measured by its influence on the logit distribution. When an answer is wrong, the highest-attributing memory is the root cause."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Memory Attribution Score (MAS)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MAS is the percentage of your retrieved context that has nonzero logit influence. A production agent targeting MAS > 75% is running efficiently. Below 25%, you're in critical context noise territory with high embedding drift and measurable response degradation."
          }
        },
        {
          "@type": "Question",
          "name": "Does Cortexa replace my memory system?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Cortexa wraps your existing store — Mem0, SuperMemory, LangChain, LlamaIndex, or custom. It sits between retrieval and generation. One pip install, zero data migration, no architecture changes."
          }
        },
        {
          "@type": "Question",
          "name": "How does GDPR cascade deletion work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cortexa maintains a provenance graph linking source memories to all derived data — embeddings, chunked summaries, cached completions. When a deletion request arrives, cx.delete() walks the graph, cascades removal through every downstream artifact, and generates a cryptographic certificate proving complete erasure."
          }
        }
      ]
    }
    </script>
