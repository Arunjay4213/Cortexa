<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/cortexalogo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cortexa — Memory Observability for AI Agents</title>
    <meta name="description" content="Your agent hallucinated. Which memory caused it? Cortexa traces every response back to the memories that influenced it." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              lime: {
                400: '#d4f535',
                500: '#C6E227',
                600: '#a8c41a',
                700: '#8aa810',
                900: '#1e2600',
                950: '#0e1200',
              },
              stone: {
                750: '#2a2825',
                850: '#1c1a18',
                950: '#131210',
              },
            },
            fontFamily: {
              sans: ['DM Sans', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
            },
            fontSize: {
              'display-xl': 'clamp(2.8rem, 5vw + 1rem, 5.5rem)',
              'display-lg': 'clamp(2rem, 3vw + 1rem, 3.5rem)',
              'display-md': 'clamp(1.5rem, 2vw + 0.5rem, 2.25rem)',
              'body-lg': 'clamp(1.05rem, 0.5vw + 0.9rem, 1.25rem)',
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg:        #0f0e0d;
        --bg-card:   #161513;
        --bg-raised: #1c1a18;
        --border:    rgba(255,255,255,0.07);
        --border-md: rgba(255,255,255,0.11);
        --text:      #f0ede8;
        --muted:     rgba(240,237,232,0.45);
        --lime:      #C6E227;
        --lime-dim:  rgba(198,226,39,0.12);
        --lime-glow: rgba(198,226,39,0.22);
        --red-dim:   rgba(239,68,68,0.12);
        --easing:    cubic-bezier(0.16, 1, 0.3, 1);
      }

      html { scroll-behavior: smooth; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      ::selection { background: rgba(198,226,39,0.18); }

      /* ── Grain overlay — SVG feTurbulence, exactly like high-end sites ── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.038;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 200px 200px;
      }

      /* ── Aurora mesh blobs ── */
      .aurora {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .aurora-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.13;
        animation: drift 18s ease-in-out infinite alternate;
      }
      .aurora-blob:nth-child(1) {
        width: 700px; height: 500px;
        background: radial-gradient(circle, #C6E227 0%, transparent 70%);
        top: -15%; left: -10%;
        animation-delay: 0s;
      }
      .aurora-blob:nth-child(2) {
        width: 600px; height: 400px;
        background: radial-gradient(circle, #6ee7b7 0%, transparent 70%);
        top: 20%; right: -15%;
        opacity: 0.07;
        animation-delay: -6s;
      }
      .aurora-blob:nth-child(3) {
        width: 500px; height: 500px;
        background: radial-gradient(circle, #C6E227 0%, transparent 70%);
        bottom: -10%; left: 30%;
        opacity: 0.08;
        animation-delay: -12s;
      }
      @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(40px, -30px) scale(1.05); }
        66%  { transform: translate(-20px, 20px) scale(0.97); }
        100% { transform: translate(30px, -15px) scale(1.03); }
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(28px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slideLeft {
        from { opacity: 0; transform: translateX(-24px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        50%       { box-shadow: 0 0 24px 2px rgba(239,68,68,0.35); }
      }
      @keyframes pulseGlowLime {
        0%, 100% { box-shadow: 0 0 0 0 rgba(198,226,39,0); }
        50%       { box-shadow: 0 0 28px 4px rgba(198,226,39,0.25); }
      }
      @keyframes logoPulse {
        0%, 100% { filter: drop-shadow(0 0 0px rgba(198,226,39,0)); }
        50%       { filter: drop-shadow(0 0 14px rgba(198,226,39,0.4)); }
      }
      @keyframes bounceY {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(6px); }
      }

      .anim-fade-up    { animation: fadeUp 0.7s var(--easing) both; }
      .anim-fade-in    { animation: fadeIn 0.5s ease both; }
      .anim-slide-left { animation: slideLeft 0.55s var(--easing) both; }
      .anim-pulse-red  { animation: pulseGlow 2.4s ease-in-out infinite; }
      .anim-pulse-lime { animation: pulseGlowLime 2.4s ease-in-out infinite; }
      .anim-logo       { animation: logoPulse 3.5s ease-in-out infinite; }
      .anim-bounce     { animation: bounceY 1.8s ease-in-out infinite; }

      .d-1 { animation-delay: 0.1s; }
      .d-2 { animation-delay: 0.25s; }
      .d-3 { animation-delay: 0.4s; }
      .d-4 { animation-delay: 0.55s; }
      .d-5 { animation-delay: 0.7s; }

      .hidden-init { opacity: 0; }

      /* ── Cards ── */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        backdrop-filter: blur(12px);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .card:hover {
        border-color: var(--border-md);
        box-shadow: 0 0 0 1px rgba(198,226,39,0.04), 0 8px 40px rgba(0,0,0,0.4);
      }
      .card-raised {
        background: var(--bg-raised);
        border: 1px solid var(--border-md);
        border-radius: 16px;
      }

      /* ── Buttons ── */
      .btn-primary {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 11px 22px;
        background: var(--lime);
        color: #0f0e0d;
        font-weight: 600;
        font-size: 0.875rem;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
        letter-spacing: -0.01em;
      }
      .btn-primary:hover {
        background: #d4f535;
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(198,226,39,0.3);
      }
      .btn-secondary {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 11px 22px;
        background: rgba(255,255,255,0.05);
        color: var(--text);
        font-weight: 500;
        font-size: 0.875rem;
        border-radius: 10px;
        border: 1px solid var(--border-md);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
        letter-spacing: -0.01em;
      }
      .btn-secondary:hover {
        background: rgba(255,255,255,0.09);
        border-color: rgba(255,255,255,0.18);
      }

      /* ── Section label ── */
      .section-label {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 18px;
      }
      .section-label::before {
        content: '';
        display: block;
        width: 28px; height: 1px;
        background: var(--lime);
        opacity: 0.7;
      }
      .section-label span {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.7rem;
        color: var(--lime);
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(198,226,39,0.1);
      }

      /* ── Nav ── */
      .nav-base {
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 900;
        height: 68px;
        display: flex; align-items: center;
        padding: 0 clamp(1.5rem, 4vw, 4rem);
        justify-content: space-between;
        transition: background 0.3s ease, border-color 0.3s ease;
      }
      .nav-scrolled {
        background: rgba(15,14,13,0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
      }

      /* ── Terminal window ── */
      .terminal-win {
        background: #0a0908;
        border: 1px solid var(--border-md);
        border-radius: 14px;
        overflow: hidden;
      }
      .terminal-titlebar {
        display: flex; align-items: center; gap: 6px;
        padding: 12px 16px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid var(--border);
      }
      .dot { width: 11px; height: 11px; border-radius: 50%; }
      .dot-r { background: #ff5f57; }
      .dot-y { background: #febc2e; }
      .dot-g { background: #C6E227; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(240,237,232,0.15); border-radius: 4px; }

      /* ── Stat cards ── */
      .stat-number {
        font-size: clamp(2rem, 4vw, 3.2rem);
        font-weight: 700;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      /* ── Logo image ── */
      .logo-img {
        height: 180px;
        width: auto;
        object-fit: contain;
      }
      .logo-img-sm {
        height: 48px;
        width: auto;
        object-fit: contain;
      }
      .logo-img-nav {
        height: 64px;
        width: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
